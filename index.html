<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./assets/favicon.png">
    <title>ContactHub - Smart Contact Manager</title>
    <!-- link google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <!--*link-fontawesome-bootstrap-styling-->
    <link rel="stylesheet" href="./style/all.min.css">
    <link rel="stylesheet" href="./style/bootstrap.min.css">
    <link rel="stylesheet" href="./style/main.css">
    <link rel="stylesheet" href="./style/media-query.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg bg-nav">
        <div class="container pt-1">
            <div class="left-side d-flex gap-3">
                <div class="icon-book bg-violet-6 rounded-3 d-flex justify-content-center align-items-center">
                    <i class="fa-solid fa-address-book text-white"></i>
                </div>
                <div class="nav-title">
                    <div>
                        <h1 class="fs-4 fw-bold mb-0">Contact<span class="text-violet-6">Hub</span></h1>
                    </div>
                    <div class="">
                        <p class="text-gray fw-medium small">Smart Contact Manager</p>
                    </div>
                </div>
            </div>
            <div class="d-flex" id="navbarSupportedContent">
                <div class="border-top my-2 line"></div>
                <ul class="navbar-nav ms-auto my-2  flex-row justify-content-center align-items-center gap-2">
                    <li class="nav-item d-flex gap-2">
                        <button class="btn-add bg-violet-6 px-3 py-2 border-0 rounded-3 text-white fs-6 fw-semibold"
                            data-bs-toggle="modal" data-bs-target="#staticBackdrop">
                            <i class="fa-solid fa-plus text-white fs-6"></i>
                            <span>add<span class="d-none d-lg-inline">contact</span></span>
                        </button>
                    </li>
                    <li class="nav-item gap-2 d-none d-lg-flex">
                        <a class="nav-link rounded-4" href="#"><i class="fa-solid fa-bell"></i></a>
                    </li>
                    <li class="nav-item d-none d-lg-flex gap-2">
                        <a class="nav-link rounded-4" href="#"><i class="fa-solid fa-gear"></i></a>
                    </li>
                    <li class="nav-item d-flex gap-2">
                        <div class="nav-photo">
                            <img src="./assets/avatar.jpg" alt="profile-pic"
                                class="img-fluid object-fit-cover w-100 rounded-2">
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <main>
        <section>
            <div class="container p-4">
                <div class="row g-3">
                    <div class="col-6 col-lg-4">
                        <div
                            class="card h-100 p-3 border border-1 border-gray-1 d-flex flex-row align-items-start gap-3 rounded-4">
                            <div class=" bg-primary d-flex align-items-center justify-content-center p-3 rounded-4">
                                <i class="fa-solid fa-users text-white"></i>
                            </div>
                            <div class="">
                                <p class="text-uppercase small fw-medium text-gray m-0">Total</p>
                                <p id="totalcontacts" class="fs-4 fw-bold  text-black m-0"></p>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-lg-4">
                        <div
                            class="card h-100 p-3 border border-1 border-gray-1 d-flex flex-row align-items-start gap-3 rounded-4">
                            <div class="bg-amper-4 d-flex align-items-center justify-content-center p-3 rounded-4">
                                <i class="fa-solid fa-star text-white"></i>
                            </div>
                            <div class="">
                                <p class="text-uppercase small fw-medium text-gray m-0">Favorites</p>
                                <p id="favoriteContacts" class="fs-4 fw-bold  text-black m-0">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-lg-4">
                        <div
                            class="card h-100 p-3 border border-1 border-gray-1 d-flex flex-row align-items-start gap-3 rounded-4">
                            <div class="bg-red-6 d-flex align-items-center justify-content-center p-3 rounded-4">
                                <i class="fa-solid fa-heart-pulse text-white"></i>
                            </div>
                            <div class="">
                                <p class="text-uppercase small fw-medium text-gray m-0">Emergency</p>
                                <p id="emergencyContacts" class="fs-4 fw-bold  text-black m-0">0</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </section>
        <section>
            <div class="container p-4">
                <div class="row gy-4">
                    <div class="col-lg-8">
                        <div class="">
                            <h2 class="fw-bold text-dark mb-2 fs-2">All Contacts</h2>
                            <p class="text-gray small mb-0">Manage and organize your 0 contacts</p>
                            <div>
                                <label for="search-input" class=""></label>
                                <div class="input-group input-group-lg outer">
                                    <span class="input-group-text" id="basic-addon1">
                                        <i class="fa-solid fa-magnifying-glass text-icon-search"></i>
                                    </span>
                                    <input oninput="searchAboutContacts()" id="searchinput" name="searchinput"
                                        type="text" class="form-control"
                                        placeholder="Search by name, phone, or email..." aria-label="search"
                                        aria-describedby="basic-addon1">
                                </div>
                            </div>
                        </div>
                        <div id="rowdata" class="row g-2">
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="shadow-sm border border-light-subtle bg-pink rounded-4 overflow-hidden">
                            <div class="favourite-card ">
                                <div class="card-header-top d-flex align-items-center gap-3 p-3">
                                    <div
                                        class="bg-amper-4 text-white d-flex align-items-center justify-content-center p-3 rounded-3">
                                        <i class="fa-solid fa-star"></i>
                                    </div>
                                    <div>
                                        <h5 class="text-black mb-0 fs-6 fw-semibold">Favorites</h5>
                                        <p class="text-gray small mb-0 fw-medium">Quick access</p>
                                    </div>
                                </div>
                                <div id="cardbody" class="d-flex bg-white justify-content-between p-2">
                                    <div class="text-muted small p-4 text-center">No favorites yet</div>
                                </div>
                            </div>
                            </div>
                            <div class="shadow-sm border border-light-subtle bg-red-1 rounded-4 overflow-hidden mt-4">
                                <div class="emergency-card ">
                                    <div class="card-header-top d-flex align-items-center gap-3 p-3">
                                        <div
                                            class="bg-danger text-white d-flex align-items-center justify-content-center p-3 rounded-3">
                                            <i class="fa-solid fa-heart-pulse"></i>
                                        </div>
                                        <div>
                                            <h5 class="text-black mb-0 fs-6 fw-semibold">Emergency</h5>
                                            <p class="text-gray small mb-0 fw-medium">Urgent contacts</p>
                                        </div>
                                    </div>
                                    <div id="cardbodyemr"
                                        class="d-flex align-items-center justify-content-center bg-white">
                                        <div class="text-gray small fw-normal p-5">No emergency contact</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
            </div>
        </section>
        <section>
            <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
            aria-labelledby="staticBackdropLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5 fw-bold text-black" id="staticBackdropLabel">Add New Contact</h1>
                        <button type="button" class="btn-close close-btn-color" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="container py-4" style="max-width: 500px;">
                            <form>
                                <div class="">
                                    <label for="fullName" class="form-label small fw-medium text-dark mb-0">
                                        Full Name <span class="text-danger">*</span>
                                    </label>
                                    <input type="text"
                                        class="form-control py-2 text-muted bg-light border-light-subtle rounded-3 mb-2 outer"
                                        id="fullName" placeholder="Enter full name" name="f-name" required>
                                </div>
                                <div class="">
                                    <label for="phoneNumber" class="form-label small fw-medium text-dark mb-0">
                                        Phone Number <span class="text-danger">*</span>
                                    </label>
                                    <input type="tel"
                                        class="form-control py-2 text-muted bg-light border-light-subtle rounded-3 mb-2 outer"
                                        id="phoneNumber" placeholder="e.g., 01012345678" name="ph-number" required>
                                </div>
                                <div class="">
                                    <label for="emailAddress" class="form-label small fw-medium text-dark mb-0">Email
                                        Address</label>
                                    <input type="email"
                                        class="form-control py-2 text-muted bg-light border-light-subtle rounded-3 mb-2 outer"
                                        id="emailAddress" placeholder="name@example.com" name="f-email">
                                </div>
                                <div class="">
                                    <label for="address" class="form-label small fw-medium text-dark mb-0">Address</label>
                                    <input type="text"
                                        class="form-control py-2 text-muted bg-light border-light-subtle rounded-3 mb-2 outer"
                                        id="address" placeholder="Enter address" name="f-address">
                                </div>
                                <div class="">
                                    <label for="group" class="form-label small fw-medium text-dark mb-0">Group</label>
                                    <select
                                        class="form-select py-2 text-black bg-light border-light-subtle rounded-3 mb-2 outer"
                                        id="groupType">
                                        <option selected>Select a group</option>
                                        <option value="Family">Family</option>
                                        <option value="Friends">Friends</option>
                                        <option value="Work">Work</option>
                                        <option value="School">School</option>
                                        <option value="other">other</option>
                                    </select>
                                </div>
                                <div class="">
                                    <label for="notes" class="form-label small fw-medium text-dark mb-0">Notes</label>
                                    <textarea
                                        class="form-control py-2 text-muted bg-light border-light-subtle rounded-3 mb-2 outer"
                                        id="notes" rows="3" placeholder="Add notes about this contact"
                                        style="resize: none;"></textarea>
                                </div>
                                <div class="d-flex align-items-center gap-4 py-3">
                                    <div class="form-check d-flex align-items-center gap-2 custom-checkbox ps-0">
                                        <input class="form-check-input custom-check-input m-0" type="checkbox"
                                            id="checkFavorite">
                                        <label
                                            class="form-check-label d-flex align-items-center gap-1 text-dark fw-medium small"
                                            for="checkFavorite">
                                            <i class="fa-solid fa-star text-warning"></i> Favorite
                                        </label>
                                    </div>
                                    <div class="form-check d-flex align-items-center gap-2 custom-checkbox ps-0">
                                        <input class="form-check-input custom-check-input m-0" type="checkbox"
                                            id="checkEmergency">
                                        <label
                                            class="form-check-label d-flex align-items-center gap-1 text-dark fw-medium small"
                                            for="checkEmergency">
                                            <i class="fa-solid fa-heart-pulse text-danger"></i> Emergency
                                        </label>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn small fw-semibold bg-gray-btn text-black border-0 w-50"
                            data-bs-dismiss="modal">Cancel</button>
                        <button id="savebtn" onclick="addContact()" type="button" class="btn bg-purple-btn text-white w-50"
                            data-bs-dismiss="modal">
                            <i class="fa-solid fa-check me-2"></i>Save Contact</button>
                        <button id="updatebtn" onclick="updateContacts(updatedIndex)" type="button"
                            class="d-none btn bg-warning text-white w-50" data-bs-dismiss="modal">
                            Update Contact</button>
                    </div>
                </div>
            </div>
        </div>

        </section>
    </main>

    <script src="./js/main.js"></script>
    <script src="./js/bootstrap.bundle.min.js"></script>
</body>


</html>
